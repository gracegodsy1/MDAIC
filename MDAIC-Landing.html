    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

NOW<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== HERO ===== -->\n  <section id=\"home\" style=\"position: relative; background: #14332f; color: #f6f4ef; overflow: hidden;\">\n    <div style=\"position: absolute; inset: 0; opacity: 0.28; background-image: repeating-linear-gradient(135deg, #1f463f 0 22px, #1a3c36 22px 44px);\"><\u002Fdiv>\n    <div style=\"position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0.18;\">\n      <span style=\"font-family: monospace; font-size: 13px; letter-spacing: 0.1em; color: #cfe0dc;\">[ clinic / care team photo ]<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"position: relative; max-width: 1200px; margin: 0 auto; padding: 130px 32px 140px;\">\n      <div style=\"max-width: 720px;\">\n        <span style=\"display: inline-block; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #b8d3cc; font-weight: 600; margin-bottom: 26px;\">Metro Denver Accident &amp; Injury Centers<\u002Fspan>\n        <h1 style=\"font-family: 'Newsreader', serif; font-weight: 500; font-size: 62px; line-height: 1.06; letter-spacing: -0.02em; margin: 0 0 22px;\">Raising the standard in accident and injury care<\u002Fh1>\n        <p style=\"font-size: 18px; line-height: 1.6; color: #cdd8d4; max-width: 520px; margin: 0 0 38px;\">Trusted chiropractic and injury recovery since <strong style=\"color: #f6f4ef; font-weight: 600;\">1992<\u002Fstrong> — advocating for the care you deserve after an auto accident.<\u002Fp>\n        <div style=\"display: flex; gap: 16px; flex-wrap: wrap; align-items: center;\">\n          <a href=\"#\" style=\"font-size: 14px; font-weight: 700; letter-spacing: 0.04em; color: #14332f; background: #f6f4ef; padding: 16px 30px; border-radius: 2px; text-decoration: none;\" style-hover=\"background: #fff;\">SCHEDULE YOUR APPOINTMENT<\u002Fa>\n          <a href=\"#about\" style=\"font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: #f6f4ef; text-decoration: none; border-bottom: 1px solid rgba(246,244,239,0.4); padding-bottom: 3px;\">Learn about our practice<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== INTRO / ABOUT ===== -->\n  <section id=\"about\" style=\"max-width: 1200px; margin: 0 auto; padding: 110px 32px;\">\n    <div style=\"display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 72px; align-items: center;\">\n      <div>\n        <span style=\"display: inline-block; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #b8763a; font-weight: 700; margin-bottom: 18px;\">Introducing our practice<\u002Fspan>\n        <h2 style=\"font-family: 'Newsreader', serif; font-weight: 500; font-size: 40px; line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 26px; color: #14332f;\">Personalized care that targets the root cause of your pain<\u002Fh2>\n        <p style=\"font-size: 16px; line-height: 1.75; color: #414b47; margin: 0 0 20px;\">We understand how confusing handling medical care after an auto accident can be, especially while you are in pain. Our team directs care to alleviate your injuries, helps you navigate insurance adjusters and claims, and will be your strongest advocate in getting the care you deserve.<\u002Fp>\n        <p style=\"font-size: 16px; line-height: 1.75; color: #414b47; margin: 0 0 32px;\">Our experienced chiropractors use advanced techniques to help you recover from injuries, improve mobility, and enhance your overall well-being — from everyday discomfort to accident-related pain.<\u002Fp>\n        <a href=\"#\" style=\"font-size: 14px; font-weight: 700; letter-spacing: 0.04em; color: #14332f; text-decoration: none; border-bottom: 2px solid #b8763a; padding-bottom: 3px;\">Learn More →<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"aspect-ratio: 4/5; background-image: repeating-linear-gradient(135deg, #e6e0d5 0 16px, #ded7ca 16px 32px); border-radius: 3px; display: flex; align-items: center; justify-content: center;\">\n        <span style=\"font-family: monospace; font-size: 12px; letter-spacing: 0.08em; color: #97907f;\">[ treatment room photo ]<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SERVICES ===== -->\n  <section id=\"services\" style=\"background: #eeeae1; border-top: 1px solid #e2ddd3; border-bottom: 1px solid #e2ddd3;\">\n    <div style=\"max-width: 1200px; margin: 0 auto; padding: 100px 32px;\">\n      <div style=\"display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 56px; flex-wrap: wrap;\">\n        <div>\n          <span style=\"display: inline-block; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #b8763a; font-weight: 700; margin-bottom: 14px;\">What we do<\u002Fspan>\n          <h2 style=\"font-family: 'Newsreader', serif; font-weight: 500; font-size: 40px; letter-spacing: -0.015em; margin: 0; color: #14332f;\">Our services<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font-size: 15px; line-height: 1.6; color: #5a635e; max-width: 360px; margin: 0;\">A complete continuum of care — from conservative chiropractic treatment to advanced imaging and specialist referrals.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; background: #ddd6c9; border: 1px solid #ddd6c9;\">\n        <sc-for list=\"{{ services }}\" as=\"svc\" hint-placeholder-count=\"4\">\n          <div style=\"background: #f6f4ef; padding: 42px 40px; display: flex; flex-direction: column; min-height: 260px;\">\n            <span style=\"font-family: 'Newsreader', serif; font-size: 15px; color: #b8763a; font-weight: 600; margin-bottom: 20px;\">{{ svc.num }}<\u002Fspan>\n            <h3 style=\"font-family: 'Newsreader', serif; font-weight: 500; font-size: 25px; letter-spacing: -0.01em; margin: 0 0 14px; color: #14332f;\">{{ svc.title }}<\u002Fh3>\n            <p style=\"font-size: 15px; line-height: 1.65; color: #4f5852; margin: 0 0 26px; flex: 1;\">{{ svc.body }}<\u002Fp>\n            <a href=\"#\" style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.05em; color: #14332f; text-decoration: none;\">LEARN MORE →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== TEAM ===== -->\n  <section style=\"max-width: 1200px; margin: 0 auto; padding: 110px 32px;\">\n    <div style=\"text-align: center; margin-bottom: 60px;\">\n      <span style=\"display: inline-block; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #b8763a; font-weight: 700; margin-bottom: 14px;\">Our team<\u002Fspan>\n      <h2 style=\"font-family: 'Newsreader', serif; font-weight: 500; font-size: 40px; letter-spacing: -0.015em; margin: 0; color: #14332f;\">Meet your chiropractors<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px;\">\n      <sc-for list=\"{{ doctors }}\" as=\"doc\" hint-placeholder-count=\"3\">\n        <div>\n          <image-slot id=\"{{ doc.slotId }}\" shape=\"rounded\" radius=\"3\" placeholder=\"{{ doc.photo }}\" style=\"display: block; width: 100%; height: auto; aspect-ratio: 3/4; margin-bottom: 22px;\"><\u002Fimage-slot>\n          <h3 style=\"font-family: 'Newsreader', serif; font-weight: 500; font-size: 24px; letter-spacing: -0.01em; margin: 0 0 6px; color: #14332f;\">{{ doc.name }}<\u002Fh3>\n          <p style=\"font-size: 14px; font-weight: 600; color: #b8763a; margin: 0 0 4px;\">{{ doc.role }}<\u002Fp>\n          <p style=\"font-size: 14px; color: #6b7570; margin: 0;\">{{ doc.location }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CONTACT FORM ===== -->\n  <section id=\"contact\" style=\"background: #14332f; color: #f6f4ef;\">\n    <div style=\"max-width: 1200px; margin: 0 auto; padding: 100px 32px; display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 72px; align-items: start;\">\n      <div>\n        <span style=\"display: inline-block; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #b8d3cc; font-weight: 700; margin-bottom: 18px;\">Get in touch<\u002Fspan>\n        <h2 style=\"font-family: 'Newsreader', serif; font-weight: 500; font-size: 60px; line-height: 1.1; letter-spacing: -0.015em; margin: 0 0 22px\">Questions? We're here to help!<\u002Fh2>\n        <p style=\"font-size: 16px; line-height: 1.7; color: #cdd8d4; margin: 0;\">Reach out and our team will get back to you promptly. Prefer to talk now? Call either office during business hours.<\u002Fp>\n      <\u002Fdiv>\n      <form onsubmit=\"{{ onSubmit }}\" style=\"background: #f6f4ef; color: #1e2422; padding: 40px; border-radius: 4px;\">\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px;\">\n          <label style=\"display: block;\">\n            <span style=\"display: block; font-size: 13px; font-weight: 600; margin-bottom: 7px;\">First name *<\u002Fspan>\n            <input type=\"text\" required=\"required\" style=\"width: 100%; padding: 12px 14px; border: 1px solid #cfc8ba; border-radius: 2px; font-family: inherit; font-size: 15px; background: #fff;\">\n          <\u002Flabel>\n          <label style=\"display: block;\">\n            <span style=\"display: block; font-size: 13px; font-weight: 600; margin-bottom: 7px;\">Last name *<\u002Fspan>\n            <input type=\"text\" required=\"required\" style=\"width: 100%; padding: 12px 14px; border: 1px solid #cfc8ba; border-radius: 2px; font-family: inherit; font-size: 15px; background: #fff;\">\n          <\u002Flabel>\n          <label style=\"display: block;\">\n            <span style=\"display: block; font-size: 13px; font-weight: 600; margin-bottom: 7px;\">Phone *<\u002Fspan>\n            <input type=\"tel\" required=\"required\" style=\"width: 100%; padding: 12px 14px; border: 1px solid #cfc8ba; border-radius: 2px; font-family: inherit; font-size: 15px; background: #fff;\">\n          <\u002Flabel>\n          <label style=\"display: block;\">\n            <span style=\"display: block; font-size: 13px; font-weight: 600; margin-bottom: 7px;\">Email<\u002Fspan>\n            <input type=\"email\" style=\"width: 100%; padding: 12px 14px; border: 1px solid #cfc8ba; border-radius: 2px; font-family: inherit; font-size: 15px; background: #fff;\">\n          <\u002Flabel>\n        <\u002Fdiv>\n        <label style=\"display: block; margin-bottom: 22px;\">\n          <span style=\"display: block; font-size: 13px; font-weight: 600; margin-bottom: 7px;\">Message *<\u002Fspan>\n          <textarea required=\"required\" rows=\"4\" style=\"width: 100%; padding: 12px 14px; border: 1px solid #cfc8ba; border-radius: 2px; font-family: inherit; font-size: 15px; background: #fff; resize: vertical;\"><\u002Ftextarea>\n        <\u002Flabel>\n        <button type=\"submit\" style=\"width: 100%; background: #b8763a; color: #fff; border: none; padding: 15px; border-radius: 2px; font-family: inherit; font-size: 14px; font-weight: 700; letter-spacing: 0.05em; cursor: pointer;\" style-hover=\"background: #a3652f;\">SUBMIT<\u002Fbutton>\n        <p style=\"font-size: 12px; line-height: 1.5; color: #7a837d; margin: 16px 0 0;\">This form is not intended for the transmission of sensitive medical information. Please do not include confidential health details.<\u002Fp>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== REVIEWS ===== -->\n  <section style=\"max-width: 1200px; margin: 0 auto; padding: 100px 32px; text-align: center;\">\n    <span style=\"display: inline-block; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #b8763a; font-weight: 700; margin-bottom: 14px;\">Reviews<\u002Fspan>\n    <h2 style=\"font-family: 'Newsreader', serif; font-weight: 500; font-size: 40px; letter-spacing: -0.015em; margin: 0 0 12px; color: #14332f;\">See what our patients are saying<\u002Fh2>\n    <div style=\"display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 50px;\">\n      <span style=\"font-size: 20px; letter-spacing: 2px; color: #b8763a;\">★★★★★<\u002Fspan>\n      <span style=\"font-size: 14px; color: #6b7570;\">Rated on Google Reviews<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; text-align: left;\">\n      <sc-for list=\"{{ reviews }}\" as=\"rev\" hint-placeholder-count=\"3\">\n        <div style=\"background: #f6f4ef; border: 1px solid #e2ddd3; border-radius: 4px; padding: 32px;\">\n          <span style=\"font-size: 15px; letter-spacing: 1px; color: #b8763a;\">★★★★★<\u002Fspan>\n          <p style=\"font-family: 'Newsreader', serif; font-size: 18px; line-height: 1.55; color: #2a332f; margin: 16px 0 22px;\">{{ rev.quote }}<\u002Fp>\n          <p style=\"font-size: 13px; font-weight: 600; color: #6b7570; margin: 0;\">— {{ rev.name }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"background: #0f2723; color: #cdd8d4;\">\n    <div style=\"max-width: 1200px; margin: 0 auto; padding: 70px 32px 40px; display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 48px;\">\n      <div>\n        <image-slot id=\"mdaic-logo-footer\" shape=\"rounded\" radius=\"4\" placeholder=\"logo\" style=\"display: block; width: 332px; height: 161px; margin-bottom: 18px\"><img src=\"d2683401-d7fe-41f2-beb0-6b414a04ab46\" alt=\"Metro Denver Accident &amp; Injury Centers\" style=\"width: 100%; height: 100%; object-fit: contain;\"><\u002Fimage-slot>\n        <p style=\"font-size: 14px; line-height: 1.6; color: #93a29c; margin: 0;\">Metro Denver Accident &amp; Injury Centers. Raising the standard in accident and injury care since 1992.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: #6f817b; font-weight: 700; margin-bottom: 16px;\">Westminster Location<\u002Fdiv>\n        <p style=\"font-size: 14px; line-height: 1.7; margin: 0;\">680 W 121st Ave, Suite 100<br>Westminster, CO 80234<br>Tel: <a href=\"tel:3034574570\" style=\"color: #cdd8d4;\">303-457-4570<\u002Fa><br><a href=\"mailto:frontdesk@metrodenveraccident.com\" style=\"color: #cdd8d4;\">frontdesk@metrodenveraccident.com<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: #6f817b; font-weight: 700; margin-bottom: 16px;\">Aurora Location<\u002Fdiv>\n        <p style=\"font-size: 14px; line-height: 1.7; margin: 0;\">1444 S Potomac St. #170<br>Aurora, CO 80012<br>Tel: <a href=\"tel:3039277027\" style=\"color: #cdd8d4;\">303-927-7027<\u002Fa><br><a href=\"mailto:metrodenveraurora@gmail.com\" style=\"color: #cdd8d4;\">metrodenveraurora@gmail.com<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top: 1px solid #1c3a34;\">\n      <div style=\"max-width: 1200px; margin: 0 auto; padding: 22px 32px; display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; font-size: 13px; color: #6f817b;\">\n        <span>© 2026 Metro Denver Accident &amp; Injury Centers<\u002Fspan>\n        <span style=\"display: flex; gap: 22px;\"><a href=\"#\" style=\"color: #6f817b; text-decoration: none;\">Privacy Policy<\u002Fa><a href=\"#\" style=\"color: #6f817b; text-decoration: none;\">Accessibility<\u002Fa><a href=\"#\" style=\"color: #6f817b; text-decoration: none;\">Terms &amp; Conditions<\u002Fa><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      services: [\n        { num: \"01\", title: \"Chiropractic Care\", body: \"Adjustments and modalities such as interferential muscle stimulation, intersegmental traction, Class IV laser, and massage therapy to alleviate your pain conservatively.\" },\n        { num: \"02\", title: \"Testing & Imaging\", body: \"Based on your symptoms, we may order MRIs, CT scans, or DMX imaging to better understand your condition and tailor a specific treatment plan.\" },\n        { num: \"03\", title: \"Pain Management Care\", body: \"Targeted pain management options that work alongside your recovery plan to keep you comfortable and moving toward lasting relief.\" },\n        { num: \"04\", title: \"Specialty Care\", body: \"When needed, we refer and advocate for specialist appointments — from physical therapy to concussion treatment to orthopedic surgery.\" },\n      ],\n      doctors: [\n        { name: \"Dr. Christopher Higgins, D.C.\", role: \"Founder; Chiropractic Physician\", location: \"\", photo: \"drop headshot\", slotId: \"doc-higgins\" },\n        { name: \"Dr. Paul Endriss, D.C.\", role: \"Owner; Chiropractic Physician\", location: \"MDAIC Aurora\", photo: \"drop headshot\", slotId: \"doc-endriss\" },\n        { name: \"Dr. Grace Godsy, D.C.\", role: \"Chiropractic Physician\", location: \"MDAIC Westminster\", photo: \"drop headshot\", slotId: \"doc-godsy\" },\n      ],\n      reviews: [\n        { quote: \"They handled everything with my insurance so I could focus on getting better. The whole team truly advocates for you.\", name: \"Verified Patient\" },\n        { quote: \"After my accident I was in constant pain. The care plan here got me back to normal faster than I expected.\", name: \"Verified Patient\" },\n        { quote: \"Professional, compassionate, and thorough. I always felt like more than just a case number.\", name: \"Verified Patient\" },\n      ],\n      onSubmit: (e) => { e.preventDefault(); alert(\"Thank you — we'll be in touch shortly.\"); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
